  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #00ff41;
    font-family: 'Galle', monospace;
    font-size: 80px;
    line-height: 1.7;
    min-height: 100vh;
    padding: 48px 56px;
    cursor: none;
  }

  #terminal {
    max-width: 860px;
    margin: 0 auto;
  }

  #header {
    color: #004d15;
    font-size: 11px;
    margin-bottom: 32px;
    letter-spacing: 0.12em;
    border-bottom: 1px solid #002a0b;
    padding-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #save-btn {
    background: transparent;
    border: 1px solid #004d15;
    color: #004d15;
    font-family: 'Galle', monospace;
    font-size: 11px;
    padding: 4px 14px;
    cursor: pointer;
    letter-spacing: 0.12em;
    transition: all 0.2s;
  }

  #save-btn:hover {
    border-color: #00ff41;
    color: #00ff41;
    background: rgba(0,255,65,0.04);
  }

  #output {
    word-break: break-word;
    white-space: pre-wrap;
    min-height: 80vh;
    text-shadow: 0 0 8px rgba(0,255,65,0.4);
  }

  #cursor {
    display: inline-block;
    width: 12px;
    height: 0.9em;
    background: #00ff41;
    vertical-align: text-bottom;
    box-shadow: 0 0 8px rgba(0,255,65,0.8);
    animation: blink 1s step-end infinite;
    margin-left: 2px;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  #char-count {
    color: #002a0b;
    transition: color 0.3s;
  }
  #char-count.active { color: #004d15; }

  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.04) 3px,
      rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    z-index: 999;
  }
</style>
</head>
<body>
<div id="terminal">
  <div id="header">
    <span>GALLE FONT/// TYPE TO BEGIN /// NO BACKSPACE /// FROM 1737 TO 2026</span>
    <div style="display:flex;gap:18px;align-items:center;">
      <span id="char-count">0 chars</span>
      <button id="save-btn" onclick="saveText()">[ SAVE ]</button>
    </div>
  </div>
  <div id="output"><span id="cursor"></span></div>
</div>

<!-- Hidden textarea captures all input including IME/Wijesekara composition -->
<textarea id="input-trap" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
  style="position:fixed;opacity:0;top:0;left:0;width:1px;height:1px;border:none;outline:none;resize:none;padding:0;"></textarea>

<script>
  let text = '';
  let lastLen = 0;
  const output = document.getElementById('output');
  const cursor = document.getElementById('cursor');
  const charCount = document.getElementById('char-count');
  const trap = document.getElementById('input-trap');

  function render() {
    output.textContent = text;
    output.appendChild(cursor);
    charCount.textContent = text.length + ' chars';
    charCount.classList.toggle('active', text.length > 0);
    window.scrollTo(0, document.body.scrollHeight);
  }

  document.addEventListener('click', () => trap.focus());
  document.addEventListener('keydown', () => trap.focus());
  trap.addEventListener('blur', () => trap.focus());

  trap.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      saveText();
      return;
    }
    if (e.key === 'Backspace' || e.key === 'Delete') {
      e.preventDefault();
    }
  });

  trap.addEventListener('input', function() {
    const val = trap.value;
    if (val.length > lastLen) {
      text += val.slice(lastLen);
      render();
    }
    trap.value = '';
    lastLen = 0;
  });

  function saveText() {
    if (!text.trim()) return;
    const blob = new Blob([text], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'galle-' + new Date().toISOString().slice(0,10) + '.txt';
    a.click();
    URL.revokeObjectURL(a.href);
  }

  render();
  trap.focus();
</script>
</body>
