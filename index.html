  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* Hide scrollbar (Firefox / IE) */
  html, body { scrollbar-width: none; -ms-overflow-style: none; }
  /* Hide scrollbar (WebKit/Chromium) */
  html::-webkit-scrollbar, body::-webkit-scrollbar { width: 0; height: 0; display: none; }

  body {
    background: #0a0a0a;
    color: #00ff41;
    font-family: 'Galle', monospace;
    font-size: 100px;
    line-height: 1.1;
    min-height: 100vh;
    padding: 48px 56px;
    cursor: none;
  }

  #terminal {
    max-width: 860px;
    margin: 0 auto;
  }

  #header {
    color: #004d15;
    font-family: 'Noto Sans Sinhala', sans-serif;
    font-size: 20px;
    margin-bottom: 32px;
    letter-spacing: 0.1em;
    border-bottom: 1px solid #002a0b;
    padding-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    /* Stay pinned to the top as text fills the screen */
    position: sticky;
    top: 0;
    z-index: 1000;
    background: #0a0a0a;
    padding-top: 12px;
  }

  #save-btn {
    background: transparent;
    border: 1px solid #004d15;
    color: #004d15;
    font-family: 'Galle', monospace;
    font-size: 11px;
    padding: 4px 14px;
    cursor: pointer;
    letter-spacing: 0.12em;
    transition: all 0.2s;
  }

  #save-btn:hover {
    border-color: #00ff41;
    color: #00ff41;
    background: rgba(0,255,65,0.04);
  }

  #output {
    word-break: normal;
    overflow-wrap: anywhere;
    white-space: pre-wrap;
    min-height: 80vh;
    text-shadow: 0 0 8px rgba(0,255,65,0.4);
  }

  #cursor {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 0.9em;
    background: #00ff41;
    color: #000;
    vertical-align: text-bottom;
    box-shadow: 0 0 8px rgba(0,255,65,0.8);
    animation: blink 1s step-end infinite;
    margin-left: 2px;
    overflow: hidden;
  }
  #cursor .typemark {
    display: inline-block;
    transform: scaleX(0.4);
    transform-origin: center;
    font-size: 0.9em;
    line-height: 1;
    white-space: nowrap;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Lock mark: a CSS-drawn padlock (font-independent, always monochrome)
     plus an unlock counter, shown when Backspace hits the locked boundary. */
  #lock-mark {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    margin-left: 5px;
    vertical-align: middle;
    opacity: 0;
    transition: opacity 0.12s ease-out;
  }
  #lock-mark.show { opacity: 1; }
  #lock-mark .padlock {
    position: relative;
    display: inline-block;
    width: 10px;
    height: 13px;
    filter: drop-shadow(0 0 4px rgba(0,255,65,0.8));
  }
  /* shackle */
  #lock-mark .padlock::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    width: 6px;
    height: 6px;
    transform: translateX(-50%);
    border: 1.5px solid #00ff41;
    border-bottom: none;
    border-radius: 3px 3px 0 0;
  }
  /* body */
  #lock-mark .padlock::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 10px;
    height: 8px;
    background: #00ff41;
    border-radius: 1.5px;
  }
  #lock-mark .count {
    font-size: 0.7em;
    line-height: 1;
    color: #00ff41;
    text-shadow: 0 0 6px rgba(0,255,65,0.8);
    min-width: 1ch;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  #char-count {
    color: #002a0b;
    transition: color 0.3s;
  }
  #char-count.active { color: #004d15; }

  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.04) 3px,
      rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    z-index: 999;
  }
</style>
</head>
<body>
<div id="terminal">
  <div id="header">
    <span>Type with Galle Font <br> <br> Galle ෆොනුරුවෙන් ටයිප් කරන්න <br> <br>Galle எழுத்துருவில் தட்டச்சு செய்யவும்

      </span>
    <div style="display:flex;gap:18px;align-items:center;">
      <span id="char-count">0 chars</span>
    </div>
  </div>
  <div id="output"><span id="cursor"><span class="typemark">෴</span></span></div>
</div>

<!-- Hidden textarea captures all input including IME/Wijesekara composition -->
<textarea id="input-trap" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
  style="position:fixed;opacity:0;top:0;left:0;width:1px;height:1px;border:none;outline:none;resize:none;padding:0;"></textarea>

<script>
  const STORAGE_KEY = 'galle-terminal-text';
  const LOCK_DELAY = 10000; // lock text after 10s of inactivity
  let text = '';
  let lockedText = '';      // committed, uneditable text
  let lockTimer = null;
  const output = document.getElementById('output');
  const cursor = document.getElementById('cursor');
  const charCount = document.getElementById('char-count');
  const trap = document.getElementById('input-trap');

  function render() {
    output.textContent = text;
    output.appendChild(cursor);
    charCount.textContent = text.length + ' chars';
    charCount.classList.toggle('active', text.length > 0);
    window.scrollTo(0, document.body.scrollHeight);
  }

  document.addEventListener('click', () => trap.focus());
  document.addEventListener('keydown', () => trap.focus());
  trap.addEventListener('blur', () => trap.focus());

  // Unlocking locked text: pressing Backspace at the locked boundary (caret at
  // the start of the editable buffer) doesn't delete immediately. It takes
  // UNLOCK_PRESSES presses to remove ONE locked character. A counter next to
  // the padlock counts down (first press -> 9, the press showing 0 deletes).
  // Pausing for UNLOCK_RESET_DELAY resets the counter back to 10.
  const UNLOCK_PRESSES = 10;
  const UNLOCK_RESET_DELAY = 1500;
  let lockMark = null, lockCount = null;
  let bsCount = 0, bsResetTimer = null;

  function buildLockMark() {
    lockMark = document.createElement('span');
    lockMark.id = 'lock-mark';
    const padlock = document.createElement('span');
    padlock.className = 'padlock'; // shape drawn via CSS ::before/::after
    lockCount = document.createElement('span');
    lockCount.className = 'count';
    lockMark.appendChild(padlock);
    lockMark.appendChild(lockCount);
  }

  function showLockMark(remaining) {
    if (!lockMark) buildLockMark();
    lockCount.textContent = remaining;
    output.appendChild(lockMark); // re-append in case render() rebuilt output
    void lockMark.offsetWidth;    // restart the fade-in on repeated presses
    lockMark.classList.add('show');
  }

  function resetUnlock() {
    bsCount = 0;
    if (lockMark) lockMark.classList.remove('show');
  }

  function backspaceAtBoundary() {
    bsCount++;
    const remaining = UNLOCK_PRESSES - bsCount; // 1st press -> 9 ... 10th -> 0
    if (bsCount >= UNLOCK_PRESSES) {
      // Remove one locked code point (handles surrogate pairs).
      const cps = Array.from(lockedText);
      cps.pop();
      lockedText = cps.join('');
      text = lockedText + trap.value;
      persist();
      render();        // rebuilds output, so re-show the mark below
      bsCount = 0;     // reset count for the next character
    }
    showLockMark(remaining);
    if (bsResetTimer) clearTimeout(bsResetTimer);
    bsResetTimer = setTimeout(resetUnlock, UNLOCK_RESET_DELAY);
  }

  trap.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      saveText();
      return;
    }
    if (e.key === 'Backspace' && lockedText &&
        trap.selectionStart === 0 && trap.selectionEnd === 0) {
      e.preventDefault();
      backspaceAtBoundary();
    }
  });

  // The textarea is the real editable buffer: the browser handles all Sinhala
  // composition and reordering natively (e.g. precomposed ආ, Wijesekara vowel
  // reordering). We must NOT steal characters out of it or clear it mid-edit —
  // doing so commits partial sequences (ආ would break into අ + ා) and blocks
  // reordering/backspace. Instead we just mirror its value into `text`.
  function persist() {
    try { localStorage.setItem(STORAGE_KEY, text); } catch (e) {}
  }

  // After LOCK_DELAY of inactivity, fold the editable buffer into lockedText
  // and clear the trap. The locked text is no longer in the textarea, so it
  // can't be edited or backspaced into — only newly typed text is editable.
  function lockNow() {
    if (trap.value) {
      lockedText += trap.value;
      trap.value = '';
    }
  }

  function resetLockTimer() {
    if (lockTimer) clearTimeout(lockTimer);
    lockTimer = setTimeout(lockNow, LOCK_DELAY);
  }

  function syncFromTrap() {
    text = lockedText + trap.value;
    persist();
    render();
    resetLockTimer();
  }

  trap.addEventListener('input', syncFromTrap);

  function saveText() {
    if (!text.trim()) return;
    const blob = new Blob([text], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'galle-' + new Date().toISOString().slice(0,10) + '.txt';
    a.click();
    URL.revokeObjectURL(a.href);
  }

  // Restore any previously saved text so it persists across reloads/sessions.
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      lockedText = saved;   // restored text is already locked (uneditable)
      text = saved;
      trap.value = '';
    }
  } catch (e) {}

  render();
  trap.focus();
</script>
</body>
